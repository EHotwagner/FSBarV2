schema_version: "1.0"

# Dependency topology for tasks.md.
#
# Every Tnnn id that appears in tasks.md MUST appear as a key here, even if
# its deps list is empty. compute-task-graph.py refuses to proceed on
# dangling references or orphaned tasks.
#
# Phase-checkpoint edges are auto-injected by the script (every task in
# Phase N+1 implicitly depends on the last foundation task of Phase N).
# Only write non-phase cross-edges here.
#
# Phase boundaries (last task per phase, the implicit checkpoint):
#   Phase 1 Setup            → T004
#   Phase 2 Foundation       → T012
#   Phase 3 US1 (state in)   → T025
#   Phase 4 US2 (commands)   → T032
#   Phase 5 US3 (carve-outs) → T038
#   Phase 6 US4 (surface)    → T045
#   Phase 7 Integration      → T050

tasks:
  # Phase 1 — Setup
  T001: []
  T002: [T001]
  T003: []
  T004: []

  # Phase 2 — Foundation
  T005: []
  T006: []
  T007: []
  T008: []
  T009: [T002]
  T010: [T005, T006, T007, T008]
  T011: [T005]
  T012: []

  # Phase 3 — User Story 1 (US1) — Broker consumes live state
  # Tests first
  T013: []
  T014: []
  T015: []
  T016: []
  T017: []
  # Implementation
  T018: [T013, T015, T016]
  T019: [T015, T016, T018]
  T020: [T014, T019]
  T021: [T013, T017, T018, T019, T020]
  T022: [T017, T021, T051, T052]
  T023: [T021, T022]
  T024: [T022]
  T025: [T022]

  # Phase 4 — User Story 2 (US2) — Commands flow back to engine
  # Tests first
  T026: []
  T027: []
  T028: [T022]
  T029: [T022]
  # Implementation
  T030: [T026, T027]
  T031: [T028, T029, T030]
  T032: [T031]

  # Phase 5 — User Story 3 (US3) — 001 synthetic carve-outs close
  T033: []
  T034: [T033]
  T035: [T033]
  T036: [T033]
  T037: [T033]
  T038: [T033, T034, T035, T036, T037, T053]

  # Phase 6 — User Story 4 (US4) — ProxyLink surface removal
  T039: []
  T040: []
  T041: [T022]
  T042: []
  T043: [T039, T040, T041]
  T044: [T021]
  T045: [T039, T040, T041, T042, T043, T044]

  # Phase 7 — Integration & Polish
  T046: []
  T047: [T020]
  T048: [T046, T047]
  T049: []
  T050: [T049]

  # Out-of-sequence additions (whole-number IDs — graph parser rejects sub-IDs).
  # Phase membership is determined by markdown header position in tasks.md, not by
  # ID order; T051/T052 sit inside Phase 3, T053 inside Phase 5.
  T051: []
  T052: []
  T053: [T033]
